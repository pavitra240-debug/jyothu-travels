[build]
  base = "travel-website/client"
  command = "npm run build"
  publish = "dist"
  functions = "../../netlify/functions" # This goes UP two levels to find the backend

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200